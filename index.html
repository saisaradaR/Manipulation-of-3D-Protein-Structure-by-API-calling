<!DOCTYPE html>
<html>
<head>
    <title>Protein 3D Viewer</title>
    <script src="https://3Dmol.org/build/3Dmol-min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #020617, #0f172a);
            color: white;
            min-height: 100vh;
            padding: 24px;
        }

        h1 {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 20px;
            color: #7dd3fc;
        }

        /* ── Search bar ── */
        .search-row {
            display: flex;
            justify-content: center;
            gap: 8px;
            position: relative;
            max-width: 560px;
            margin: 0 auto 12px;
        }

        #proteinInput {
            flex: 1;
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #1e293b;
            color: white;
            font-size: 1rem;
            outline: none;
        }
        #proteinInput:focus { border-color: #38bdf8; }

        #loadBtn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            background: #3b82f6;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        #loadBtn:hover { background: #2563eb; }
        #loadBtn:disabled { background: #475569; cursor: default; }

        /* ── Autocomplete dropdown ── */
        #suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            right: 56px;        /* leave room for button */
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 0 0 8px 8px;
            z-index: 100;
            display: none;
            max-height: 240px;
            overflow-y: auto;
        }

        .suggestion-item {
            padding: 10px 14px;
            cursor: pointer;
            border-bottom: 1px solid #0f172a;
            font-size: 0.88rem;
        }
        .suggestion-item:hover { background: #263348; }
        .suggestion-item .sid  { color: #38bdf8; font-weight: bold; margin-right: 8px; }
        .suggestion-item .stitle { color: #94a3b8; }

        /* ── Style buttons ── */
        .style-row {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .style-btn {
            padding: 8px 18px;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #1e293b;
            color: #cbd5e1;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
        }
        .style-btn:hover  { background: #263348; border-color: #38bdf8; }
        .style-btn.active { background: #1d4ed8; border-color: #60a5fa; color: white; }

        /* ── Status bar ── */
        #status {
            text-align: center;
            font-size: 0.9rem;
            color: #94a3b8;
            margin-bottom: 10px;
            min-height: 22px;
        }
        #status.error { color: #f87171; }
        #status.ok    { color: #4ade80; }

        /* ── Viewer ── */
        #viewer {
            width: 100%;
            max-width: 900px;
            height: 520px;
            margin: 0 auto;
            background: #000;
            border-radius: 14px;
            border: 1px solid #1e3a5f;
            overflow: hidden;
            position: relative;
        }

        /* ── Info panel ── */
        #infoPanel {
            max-width: 900px;
            margin: 14px auto 0;
            background: #0f172a;
            border: 1px solid #1e293b;
            border-radius: 10px;
            padding: 14px 18px;
            font-size: 0.85rem;
            color: #94a3b8;
            display: none;
        }
        #infoPanel span { color: #7dd3fc; font-weight: bold; }
    </style>
</head>

<body>

<h1>🧬 Protein 3D Viewer</h1>

<!-- ── Search ── -->
<div class="search-row">
    <input id="proteinInput"
        placeholder="Type a protein name or PDB ID (e.g. hemoglobin, 1A3N)"
        autocomplete="off">
    <button id="loadBtn" onclick="loadProtein()">Load</button>
    <div id="suggestions"></div>
</div>

<!-- ── Render style ── -->
<div class="style-row">
    <button class="style-btn active" id="btn-cartoon" onclick="setStyle('cartoon')">Cartoon</button>
    <button class="style-btn"        id="btn-stick"   onclick="setStyle('stick')">Stick</button>
    <button class="style-btn"        id="btn-sphere"  onclick="setStyle('sphere')">Sphere</button>
    <button class="style-btn"        id="btn-surface" onclick="setStyle('surface')">Surface</button>
    <button class="style-btn"        id="btn-line"    onclick="setStyle('line')">Line</button>
</div>

<div id="status">Enter a protein name above and click Load.</div>
<div id="viewer"></div>

<!-- Info panel shows PDB ID + title after load -->
<div id="infoPanel">
    Loaded: <span id="infoId"></span> &nbsp;|&nbsp; <span id="infoTitle"></span>
</div>

<script>
    let viewer      = null;
    let currentStyle = "cartoon";
    let suggestTimer = null;

    // ── Enter key ────────────────────────────────────────────────────
    document.getElementById("proteinInput").addEventListener("keydown", e => {
        if (e.key === "Enter") { hideSuggestions(); loadProtein(); }
        if (e.key === "Escape") hideSuggestions();
    });

    // ── Live suggestions while typing ────────────────────────────────
    document.getElementById("proteinInput").addEventListener("input", () => {
        clearTimeout(suggestTimer);
        const val = document.getElementById("proteinInput").value.trim();
        if (val.length < 2) { hideSuggestions(); return; }
        suggestTimer = setTimeout(() => fetchSuggestions(val), 350);
    });

    document.addEventListener("click", e => {
        if (!e.target.closest(".search-row")) hideSuggestions();
    });

    function fetchSuggestions(query) {
        fetch("http://localhost:8080/suggest?query=" + encodeURIComponent(query))
            .then(r => r.json())
            .then(items => {
                const box = document.getElementById("suggestions");
                if (!items || items.length === 0) { hideSuggestions(); return; }
                box.innerHTML = "";
                items.forEach(item => {
                    const div = document.createElement("div");
                    div.className = "suggestion-item";
                    div.innerHTML =
                        `<span class="sid">${item.id}</span>` +
                        `<span class="stitle">${item.title}</span>`;
                    div.onclick = () => {
                        document.getElementById("proteinInput").value = item.id;
                        hideSuggestions();
                        loadProtein();
                    };
                    box.appendChild(div);
                });
                box.style.display = "block";
            })
            .catch(() => hideSuggestions());
    }

    function hideSuggestions() {
        document.getElementById("suggestions").style.display = "none";
    }

    // ── Load protein ─────────────────────────────────────────────────
    function loadProtein() {
        const query = document.getElementById("proteinInput").value.trim();
        if (!query) { setStatus("Please enter a protein name or PDB ID.", "error"); return; }

        setStatus("🔍 Searching RCSB for \"" + query + "\"...", "");
        document.getElementById("loadBtn").disabled = true;
        document.getElementById("infoPanel").style.display = "none";

        const url = "http://localhost:8080/protein?query="
                  + encodeURIComponent(query) + "&t=" + Date.now();

        fetch(url)
            .then(res => {
                if (!res.ok) return res.text().then(t => { throw new Error(t); });
                return res.text();
            })
            .then(data => {
                if (data.startsWith("ERROR")) throw new Error(data);

                // Extract PDB ID from HEADER line (first line of the file)
                let pdbId    = "Unknown";
                let pdbTitle = "";
                const lines  = data.split("\n");

                for (const line of lines) {
                    if (line.startsWith("HEADER")) {
                        // HEADER    OXYGEN TRANSPORT              25-SEP-98   1A3N
                        const parts = line.trim().split(/\s+/);
                        pdbId = parts[parts.length - 1];
                        pdbTitle = line.substring(10, 50).trim();
                        break;
                    }
                }

                renderStructure(data);

                setStatus("✅ Loaded: " + pdbId + (pdbTitle ? " — " + pdbTitle : ""), "ok");
                document.getElementById("infoId").textContent    = pdbId;
                document.getElementById("infoTitle").textContent = pdbTitle;
                document.getElementById("infoPanel").style.display = "block";
            })
            .catch(err => {
                setStatus(err.message, "error");
            })
            .finally(() => {
                document.getElementById("loadBtn").disabled = false;
            });
    }

    // ── Render into 3Dmol viewer ─────────────────────────────────────
    function renderStructure(pdbData) {
        const container = document.getElementById("viewer");
        container.innerHTML = "";   // clear old canvas

        viewer = $3Dmol.createViewer(container, { backgroundColor: "black" });
        viewer.addModel(pdbData, "pdb");

        applyStyle(currentStyle);   // apply whatever style was last selected

        viewer.zoomTo();
        viewer.render();
    }

   // ── Style switcher ───────────────────────────────────────────────
function setStyle(type) {
    currentStyle = type;

    // Update button highlight
    document.querySelectorAll(".style-btn").forEach(b => b.classList.remove("active"));
    document.getElementById("btn-" + type).classList.add("active");

    if (!viewer) return;
    applyStyle(type);
}

function applyStyle(type) {
    // ✅ Always clear ALL previous styles AND surfaces first
    viewer.setStyle({}, {});
    viewer.removeAllSurfaces();

    if (type === "cartoon") {
        viewer.setStyle({}, { cartoon: { color: "spectrum" } });

    } else if (type === "stick") {
        viewer.setStyle({}, { stick: { colorscheme: "Jmol", radius: 0.15 } });

    } else if (type === "sphere") {
        viewer.setStyle({}, { sphere: { colorscheme: "Jmol", scale: 0.3 } });

    } else if (type === "surface") {
        viewer.setStyle({}, { cartoon: { color: "spectrum", opacity: 0.5 } });
        viewer.addSurface($3Dmol.SurfaceType.VDW, {
            opacity: 0.75,
            colorscheme: "whiteCarbon"
        }, {}, {}, function() {
            viewer.render(); // ✅ render AFTER surface finishes computing
        });
        return; // ✅ skip the render() at the bottom — callback handles it

    } else if (type === "line") {
        viewer.setStyle({}, { line: { colorscheme: "Jmol", linewidth: 2 } });

    } else if (type === "cross") {
        viewer.setStyle({}, { cross: { colorscheme: "Jmol", scale: 0.3 } });
    }

    // Render for all non-surface styles
    viewer.render();
}

    // ── Status helper ────────────────────────────────────────────────
    function setStatus(msg, type) {
        const el = document.getElementById("status");
        el.textContent  = msg;
        el.className    = type;   // "ok" | "error" | ""
    }
</script>

</body>
</html>
